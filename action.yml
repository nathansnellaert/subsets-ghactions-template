name: 'Subsets Integration Template'
description: 'Reusable workflow for Subsets data integrations'
author: 'Your Name'

inputs:
  run_command:
    description: 'Command to run for the integration'
    required: true
  api_url:
    description: 'Subsets API URL'
    required: false
    default: 'https://api.subsets.io'
  api_key:
    description: 'Subsets API Key'
    required: true
  commit_after_run:
    description: 'Whether to commit changes after running the command'
    required: false
    default: false

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Poetry
      shell: bash
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      shell: bash
      run: poetry install --no-interaction --no-root

    - name: Configure Git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run integration
      shell: bash
      env:
        SUBSETS_API_KEY: ${{ inputs.api_key }}
        SUBSETS_API_URL: ${{ inputs.api_url }}
      run: ${{ inputs.run_command }}

    - name: Commit changes if any
      if: inputs.commit_after_run == 'true'
      shell: bash
      run: |
        git add .
        if ! git diff --cached --quiet; then
          git commit -m "Update data $(date +%Y-%m-%d)"
          git push
        else
          echo "No changes to commit"
        fi